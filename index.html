<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💻 Makro Yazılım</title>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      overflow: hidden;
      font-family: 'Kalam', cursive;
      font-size: 18px;
      background-color: #5a3e28;
      background-image:
        repeating-linear-gradient(87deg, transparent, transparent 100px, rgba(0,0,0,0.04) 100px, rgba(0,0,0,0.04) 101px),
        repeating-linear-gradient(3deg,  transparent, transparent 60px,  rgba(255,255,255,0.03) 60px, rgba(255,255,255,0.03) 61px);
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .paper {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fefcf3;
      background-image: repeating-linear-gradient(
        transparent, transparent 34px, #c8d4e3 34px, #c8d4e3 35px
      );
      box-shadow: 4px 0 0 #d9c9a3, 8px 0 20px rgba(0,0,0,0.3), -2px 0 8px rgba(0,0,0,0.15);
    }
    .paper::before {
      content: '';
      position: absolute;
      left: 64px; top: 0; bottom: 0; width: 2px;
      background: rgba(210,70,70,0.35);
      pointer-events: none; z-index: 1;
    }
    .paper::after {
      content: '';
      position: absolute;
      left: 18px; top: 52px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #5a3e28;
      box-shadow: 0 100px 0 #5a3e28, 0 200px 0 #5a3e28,
                  0 300px 0 #5a3e28, 0 400px 0 #5a3e28, 0 500px 0 #5a3e28;
      pointer-events: none; z-index: 1;
    }

    /* ── BÖLÜMLER ── */
    .p-head    { flex-shrink: 0; padding: 14px 24px 0 80px; }
    .p-stats   { flex-shrink: 0; padding: 7px 24px 9px 80px; border-bottom: 1.5px dashed #b8bcc8; }
    .p-body    { flex: 1; overflow-y: auto; padding: 10px 24px 6px 80px; scrollbar-width: thin; scrollbar-color: #c8d4e3 transparent; }
    .p-choices { flex-shrink: 0; padding: 5px 24px 12px 80px; }

    /* ── SCREENS ── */
    .screen { display: none; height: 100%; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── BUTONLAR ── */
    .btn {
      display: inline-block; font-family: 'Kalam', cursive;
      font-size: 1.4em; font-weight: 700; padding: 10px 32px;
      cursor: pointer; border: 2px solid;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.13);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 4px 5px 0 rgba(0,0,0,0.18); }
    .btn:active { transform: translateY(0);    box-shadow: 1px 1px 0 rgba(0,0,0,0.1);  }
    .btn-y   { background: #fef08a; border-color: #c8a000; color: #1a1a1a; }
    .btn-g   { background: #86efac; border-color: #16a34a; color: #1a1a1a; }
    .btn-off { opacity: 0.4; pointer-events: none; }

    /* ── INTRO ── */
    .intro-inner {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; text-align: center; gap: 10px; padding: 0 20px;
    }
    .logo-tag {
      font-size: 0.95em; color: #aaa; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 4px;
    }

    /* ── CHAR ── */
    .char-inner {
      display: flex; flex-direction: column;
      height: 100%; justify-content: center; gap: 8px;
    }
    .sec-title {
      font-size: 1.85em; font-weight: 700; color: #1a1a1a;
      border-bottom: 2px solid #1a1a1a; padding-bottom: 3px; margin-bottom: 4px;
    }
    .char-label { font-size: 1.2em; color: #555; }
    .char-input {
      font-family: 'Kalam', cursive; font-size: 1.4em;
      border: none; border-bottom: 2px solid #555; background: transparent;
      outline: none; width: 200px; color: #1a1a1a; padding: 2px 0;
    }
    .pos-list { display: flex; flex-direction: column; gap: 5px; margin: 4px 0; }
    .pos-btn {
      font-family: 'Kalam', cursive; font-size: 1.2em;
      background: transparent; border: 1.5px solid #ccc; padding: 7px 14px;
      text-align: left; cursor: pointer; color: #333; transition: all 0.13s;
    }
    .pos-btn:hover, .pos-btn.sel {
      background: #fef9c3; border-color: #c8a000;
      transform: translateX(8px); font-weight: 700;
    }

    /* ── STATS ── */
    .day-info { font-size: 1.05em; color: #999; margin-bottom: 5px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 18px; }
    .s-row { display: flex; align-items: center; gap: 6px; }
    .s-lbl { width: 108px; font-size: 1.02em; color: #555; flex-shrink: 0; }
    .s-track { flex: 1; height: 10px; background: #e6e0d0; border: 1px solid #ccc; overflow: hidden; }
    .s-fill {
      height: 100%; transition: width 0.5s cubic-bezier(.4,0,.2,1);
      background-image: repeating-linear-gradient(45deg,
        rgba(255,255,255,0.18), rgba(255,255,255,0.18) 2px, transparent 2px, transparent 6px);
    }
    .fk { background-color: #4a6cf7; }
    .fp { background-color: #e85d4a; }
    .fa { background-color: #27ae60; }
    .fi { background-color: #f97316; }
    .s-num { width: 44px; text-align: right; font-size: 0.92em; color: #888; }

    /* ── SENARYO ── */
    .sc-title { font-size: 1.7em; font-weight: 700; color: #111; margin-bottom: 7px; line-height: 1.2; flex-shrink: 0; }
    .sc-text  { font-size: 1.27em; color: #2d2d2d; line-height: 1.62; white-space: pre-wrap; }

    /* ── STRİP SEÇENEKLER ── */
    .strip-wrap { display: flex; flex-direction: column; gap: 5px; }
    .strip {
      display: flex; align-items: center;
      width: 100%; min-height: 43px;
      padding: 7px 14px 7px 22px;
      border: none; cursor: pointer;
      text-align: left; position: relative;
      font-family: 'Kalam', cursive; font-size: 1.18em;
      color: #1a1a1a; line-height: 1.3;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.55);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .strip::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 10px;
      background: rgba(0,0,0,0.1); border-right: 1px solid rgba(0,0,0,0.07);
    }
    .strip::after {
      content: '';
      position: absolute; right: 0; bottom: 0;
      width: 0; height: 0; border-style: solid;
      border-width: 0 0 13px 13px;
      border-color: transparent transparent rgba(0,0,0,0.08) transparent;
    }
    .strip:nth-child(1) { background: #fef08a; }
    .strip:nth-child(2) { background: #fda4af; }
    .strip:nth-child(3) { background: #93c5fd; }
    .strip:nth-child(4) { background: #86efac; }
    .strip:hover  { transform: translateX(6px); box-shadow: 4px 3px 10px rgba(0,0,0,0.18); }
    .strip:disabled { opacity: 0.38; pointer-events: none; }

    /* ── FEEDBACK OVERLAY ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.22s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .fb-card {
      background: #fefcf3;
      background-image: repeating-linear-gradient(transparent, transparent 34px, #c8d4e3 34px, #c8d4e3 35px);
      max-width: 460px; width: 92%;
      padding: 30px 34px 26px;
      box-shadow: 5px 5px 0 #d9c9a3, 8px 8px 22px rgba(0,0,0,0.35);
      position: relative;
    }
    .fb-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 2px;
      background: rgba(210,70,70,0.3);
    }
    .fb-deltas { font-size: 1.5em; font-weight: 700; margin-bottom: 10px; line-height: 1.6; }
    .fb-text   { font-size: 1.25em; color: #444; margin-bottom: 20px; font-style: italic; line-height: 1.5; }
    .dp { color: #16a34a; }
    .dn { color: #dc2626; }
    .dz { color: #888; }

    /* ── ACİL TIMER ── */
    #acil-timer {
      font-size:1.35em; font-weight:700; color:#dc2626;
      background:#fee2e2; border:2px solid #dc2626;
      padding:2px 10px; border-radius:4px; letter-spacing:1px;
    }
    @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.35} }
    #acil-timer.urgent { animation:pulse-red 0.5s infinite; }

    /* ── KARANLIK MOD ── */
    #dark-toggle {
      position:absolute; top:8px; right:14px; z-index:20;
      background:none; border:none; cursor:pointer;
      font-size:1.3em; opacity:0.4; transition:opacity 0.2s; line-height:1;
    }
    #dark-toggle:hover { opacity:0.9; }

    body.dark {
      background-color:#0a0906;
    }
    body.dark .paper {
      background-color:#1c1b14;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 15%, rgba(255,190,60,0.07) 0%, transparent 70%),
        repeating-linear-gradient(transparent, transparent 34px, #252520 34px, #252520 35px);
      box-shadow: 0 0 80px rgba(255,150,20,0.06), 4px 0 0 #111008, 8px 0 24px rgba(0,0,0,0.7);
    }
    body.dark .paper::after { background:#0a0906; box-shadow:0 100px 0 #0a0906,0 200px 0 #0a0906,0 300px 0 #0a0906,0 400px 0 #0a0906,0 500px 0 #0a0906; }
    body.dark .sec-title    { color:#e0d8c8; border-color:#4a4840; }
    body.dark .char-label   { color:#888; }
    body.dark .char-input   { color:#e0d8c8; border-color:#555; }
    body.dark .pos-btn      { color:#bbb; border-color:#3a3830; }
    body.dark .pos-btn:hover, body.dark .pos-btn.sel { background:#2a2a18; border-color:#8a7a00; color:#fef08a; }
    body.dark .logo-tag     { color:#555; }
    body.dark .day-info     { color:#666; }
    body.dark .s-lbl        { color:#888; }
    body.dark .s-track      { background:#2a2820; border-color:#3a3830; }
    body.dark .s-num        { color:#666; }
    body.dark .sc-title     { color:#e0d8c8; }
    body.dark .sc-text      { color:#b0a898; }
    body.dark .p-stats      { border-color:#2a2820; }
    body.dark .fb-card      { background-color:#1c1b14; background-image:repeating-linear-gradient(transparent,transparent 34px,#252520 34px,#252520 35px); }
    body.dark .fb-text      { color:#888; }
    body.dark .result-comment { color:#888; }
    body.dark .btn-y        { background:#2a2818; border-color:#7a6000; color:#fef08a; }
    body.dark .btn-g        { background:#0f2018; border-color:#145a30; color:#86efac; }
    body.dark .overlay      { background:rgba(0,0,0,0.72); }

    /* ── SONUÇ ── */
    .result-inner {
      height: 100%; overflow-y: auto; padding: 0;
      scrollbar-width: thin; scrollbar-color: #c8d4e3 transparent;
    }
    .result-verd    { font-size: 1.45em; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .result-comment { font-size: 1.18em; color: #555; margin-bottom: 7px; font-style: italic; }
    .result-overall {
      margin: 12px 0; padding: 13px 16px;
      background: #fef9c3; border-left: 4px solid #c8a000;
      font-size: 1.3em; font-weight: 700; color: #1a1a1a;
    }
  </style>
</head>
<body>
<div class="paper">
<button id="dark-toggle" onclick="toggleDark()" title="Gece/Gündüz modu">🌙</button>

  <!-- ══ INTRO ══ -->
  <div class="screen active" id="s-intro">
    <div class="p-head" style="height:0"></div>
    <div class="p-body" style="display:flex;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div class="logo-tag">Makro Yazılım A.Ş.</div>
        <div style="font-size:2.8em;font-weight:700;color:#1a1a1a;margin-bottom:6px">💻 Makro Yazılım</div>
        <div style="font-size:1.5em;color:#888;margin-bottom:24px">Bir Kariyer Simülasyonu</div>
        <div style="font-size:1.27em;color:#444;line-height:1.75;margin-bottom:32px">
          Her karar kariyerini, patronunu,<br>
          arkadaşlarını ve aileni etkiliyor.<br>
          <span style="color:#999;font-size:0.9em">Bazıları düşündüğün gibi değil.</span>
        </div>
        <button class="btn btn-y" onclick="goster('s-char');charEkrani()">🚀 Başla</button>
      </div>
    </div>
  </div>

  <!-- ══ CHAR ══ -->
  <div class="screen" id="s-char">
    <div class="p-head"><div style="height:14px"></div></div>
    <div class="p-body">
      <div class="char-inner">
        <div class="sec-title">Makro Yazılım'a Hoş Geldin</div>
        <label class="char-label">Adın nedir?</label>
        <input class="char-input" id="char-ad" type="text" placeholder="Ali" maxlength="20">
        <label class="char-label" style="margin-top:8px">Pozisyonunu seç:</label>
        <div class="pos-list" id="pos-list"></div>
        <label class="char-label" style="margin-top:12px">Şirket kültürü:</label>
        <div style="display:flex;gap:8px;margin-top:4px" id="kultur-list">
          <button class="pos-btn" id="k-startup" onclick="secKultur('startup',this)">🚀 Startup</button>
          <button class="pos-btn" id="k-kurumsal" onclick="secKultur('kurumsal',this)">🏢 Kurumsal</button>
        </div>
        <button class="btn btn-y btn-off" id="btn-basla" onclick="oyunBasla()" style="margin-top:8px;align-self:flex-start">İşe Başla →</button>
      </div>
    </div>
  </div>

  <!-- ══ GAME ══ -->
  <div class="screen" id="s-game">
    <div class="p-head" style="display:flex;justify-content:space-between;align-items:center">
      <div class="day-info" id="day-info"></div>
      <div id="acil-timer" style="display:none"></div>
    </div>
    <div class="p-stats">
      <div class="stats-grid" id="stats-grid"></div>
    </div>
    <div class="p-body" id="p-body">
      <div class="sc-title" id="sc-title"></div>
      <div class="sc-text"  id="sc-text"></div>
    </div>
    <div class="p-choices">
      <div class="strip-wrap" id="strip-wrap"></div>
    </div>
  </div>

  <!-- ══ RESULT ══ -->
  <div class="screen" id="s-result">
    <div class="p-head"><div style="height:14px"></div></div>
    <div class="p-body">
      <div class="result-inner" id="result-inner"></div>
    </div>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="fb-card">
    <div class="fb-deltas" id="fb-deltas"></div>
    <div class="fb-text"   id="fb-text"></div>
    <button class="btn btn-y" onclick="feedbackKapat()">Devam →</button>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   ŞEMA: k=kariyer  p=patron  a=arkadaslar  i=aile
════════════════════════════════════════════ */

const POZLAR = [
  'Junior Developer',
  'Mid-level Developer',
  'Senior Developer',
  'Yapay Zeka Mühendisi',
  'Test Mühendisi',
  'Proje Yöneticisi'
];

/* ── GENEL SENARYO HAVUZU ──────────────────── */
const GEN = [
  {
    t:'📋 Sprint Planning',
    m:s=>`Pazartesi 09:00. Henüz kahveni bile içmemişken PM Tarık Bey "Sprint planning var, 5 dakikaya gel" dedi.\n\nEkran dolup taşıyor: 47 backlog item.\n\nTarık Bey: "Bu sprint ${s.n}, hepsini bitiririz değil mi?" Ekip sana bakıyor. Kaktüs bile sana bakıyor.`,
    o:[
      {m:'"Tabii ki!" de ve mucize bekle.',           k:-15,p:+5, a:-5, i:0, ac:'Sprint ortasında çöktün. Tarık Bey "neden söylemedi?" dedi.'},
      {m:'Story point hesapla, gerçekçi tahmin sun.', k:+20,p:+10,a:+5, i:0, ac:'Veri odaklı yaklaşımın takdir gördü.'},
      {m:'"Önce önceliklendirme yapalım" de.',        k:+10,p:0, a:+5, i:0, ac:'Sağduyulu buldular ama Tarık Bey biraz sıkıldı.'},
      {m:'Telefona bak, "acil" de ve kaç.',           k:-5, p:-15,a:-5, i:0, ac:'Kaçtın ama Slack\'te 47 kez mention\'landın.'}
    ]
  },
  {
    t:'💬 Yanlış Slack Mesajı',
    m:s=>`Öğle arası. Arkadaşına şikâyet yazacaksın:\n\n"Tarık Bey bugün de saçmaladı 🤦"\n\n...Enter'a bastın. Gönderildi.\n\nKanal: #genel 👁️ (127 üye). Tarık Bey okudu.`,
    o:[
      {m:'Mesajı sil, olmamış gibi davran.',              k:-10,p:-20,a:0,  i:0, ac:'Herkes gördü. Slack bildirimleri silinemez.'},
      {m:'"Yanlış kanala, özür dilerim!" yaz.',           k:-5, p:-10,a:+5, i:0, ac:'Dürüst davrandın ama utanç devam ediyor.'},
      {m:'Tarık Bey\'e özür DM\'i at, yüz yüze konuş.', k:+15,p:+10,a:0,  i:0, ac:'Olgun yaklaşım. Tarık Bey takdir etti.'},
      {m:'Sahiplen: "Evet, bu gerçek düşüncem."',        k:+5, p:-5, a:+15, i:0, ac:'Arkadaşlar "bizim sesi" dedi. Tarık Bey ikili görüşme istedi.'}
    ]
  },
  {
    t:'🚨 Cuma 17:58 — Prod\'da Hata',
    m:s=>`Çantanı alıyorsun, kapıya yürüyorsun...\n\nTelefon titriyor: "CRITICAL: Ödeme servisi çöktü."\n\nSon deploy senindi. 17:45\'te merge etmiştin. Ekip hâlâ ofiste. Tarık Bey de.`,
    o:[
      {m:'Geri dön, analiz et, düzelt.',         k:+25,p:+20,a:+10,i:0, ac:'45 dakikada fix\'ledin. Tarık Bey "işte bu" dedi.'},
      {m:'Deploy\'u revert et, sonra incele.',   k:+20,p:+15,a:+5, i:0, ac:'Hızlı düşündün. Servis kurtarıldı.'},
      {m:'Telefonu cebine koy, "görmedim" de.', k:-30,p:-30,a:-20,i:0, ac:'Pazartesi toplantısı çok gergin geçti. Çok.'},
      {m:'On-call kişiyi ara, devret.',          k:-5, p:-5, a:-10,i:0, ac:'"Senin deploy\'unda" baskısı hissedildi.'}
    ]
  },
  {
    t:'🔍 Code Review',
    m:s=>`PR\'ını açtın. Üç günlük emek.\n\nKıdemli geliştirici Cem incelemeye başlıyor:\n💬 "Bu değişken ismi ne anlama geliyor?"\n💬 "Magic number kullanmışsın."\n💬 "Neden bu kadar nested if var?"\n\nSon yorum: "Genel mantık iyi ama ciddi refactor lazım."`,
    o:[
      {m:'Tüm yorumları dikkate al, güncelle.',  k:+20,p:+5, a:+10,i:0, ac:'Büyüdün. Cem approve etti.'},
      {m:'"LGTM dersen merge ederim" de.',       k:-20,p:-5, a:-15,i:0, ac:'Cem çıldırdı. Teknik borç birikti.'},
      {m:'Kolayları yap, gerisini TODO bırak.',  k:-5, p:0,  a:-5, i:0, ac:'TODO\'lar asla çözülmedi.'},
      {m:'Cem\'le sync kur, kritikleri tartış.', k:+15,p:+5, a:+15,i:0, ac:'Pragmatik yaklaşım. Cem artık sana lunch\'ta yer ayırıyor.'}
    ]
  },
  {
    t:'📅 Bu Toplantı E-posta Olabilirdi',
    m:s=>`Takviminde 2 saatlik toplantı: "Dashboard renk paleti kararı". 14 kişi davetli.\n\nDeadline yarın.\n\n38. dakika: "Bu turkuaz değil, zümrüt yeşili!" tartışması sürüyor.`,
    o:[
      {m:'Sabırla otur, katılımcı görün.',              k:-5, p:+5, a:0,  i:0, ac:'2 saat gitti. Feature gecikmesi başladı.'},
      {m:'"Bu kararı 3 kişi alabilir, çıkayım mı?"',   k:+10,p:-5, a:+5, i:0, ac:'Haklıydın. Çıktın, feature\'ı bitirdin.'},
      {m:'Toplantıda gizlice feature kodla.',           k:+5, p:-10,a:+10,i:0, ac:'Riskli ama pull off ettin.'},
      {m:'Herkese asenkron kültür mini-eğitimi ver.',   k:+15,p:+5, a:+15,i:0, ac:'Kültür değişmeye başladı. Tarık Bey not aldı.'}
    ]
  },
  {
    t:'🎓 Yeni Eleman: Zeynep',
    m:s=>`Zeynep bugün Makro Yazılım'a katıldı. Tarık Bey: "Zeynep\'i sen karşıla."\n\nDeadline yarın, 0 zamanın var.\n\nZeynep: "Repo\'yu clone\'ladım ama çalıştıramadım."\nREADME son güncelleme: 3 yıl önce.`,

function timerBasla(sc,w){

  timerInterval=setInterval(()=>{

function timerDur(){

/* ── SES ── */
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playClick(){
  try{
    const c=getAudio(),t=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.setValueAtTime(1400,t);
    o.frequency.exponentialRampToValueAtTime(700,t+0.03);
    g.gain.setValueAtTime(0.06,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    o.start(t);o.stop(t+0.05);
  }catch(e){}
}
function playPaper(){
  try{
    const c=getAudio(),t=c.currentTime;
    const n=Math.floor(c.sampleRate*0.45);
    const buf=c.createBuffer(1,n,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++){
      // beyaz gürültü + hafif yüksek frekans filtresi simülasyonu
      d[i]=(Math.random()*2-1)*(i<n*0.05 ? i/(n*0.05) : Math.pow(1-(i-n*0.05)/(n*0.95),1.4));
    }
    const src=c.createBufferSource();src.buffer=buf;
    // bandpass filtresi — kağıt sesinin frekans aralığı
    const filter=c.createBiquadFilter();
    filter.type='bandpass';
    filter.frequency.value=3000;
    filter.Q.value=0.8;
    const g=c.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.7,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    src.connect(filter);filter.connect(g);g.connect(c.destination);src.start(t);
  }catch(e){}
}

/* ── YARDIMCILAR ── */
function goster(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function karistir(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}
function sik(v){return Math.max(0,Math.min(100,v));}

/* ── KARAKTER ── */
function charEkrani() {
  selPoz=null; selKulturVal=null;
  const list=document.getElementById('pos-list');
  list.innerHTML='';
  POZLAR.forEach(p=>{
    const b=document.createElement('button');
    b.className='pos-btn'; b.textContent=p;
    b.onclick=()=>{
      selPoz=p;
      list.querySelectorAll('.pos-btn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      if(selKulturVal) document.getElementById('btn-basla').classList.remove('btn-off');
    };
    list.appendChild(b);
  });
}
function secKultur(k,btn){
  selKulturVal=k;
  document.getElementById('kultur-list').querySelectorAll('.pos-btn').forEach(x=>x.classList.remove('sel'));
  btn.classList.add('sel');
  if(selPoz) document.getElementById('btn-basla').classList.remove('btn-off');
}

function oyunBasla() {
  if(!selPoz||!selKulturVal)return;
  const ad=document.getElementById('char-ad').value.trim()||'Ali';
  const cfg=POZ_CONFIG[selPoz]||{kariyer:50,patron:50,arkadaslar:50,aile:50};
  ST={n:ad, poz:selPoz, kultur:selKulturVal,
      kariyer:cfg.kariyer, patron:cfg.patron, arkadaslar:cfg.arkadaslar, aile:cfg.aile,
      flags:new Set(), stats:{k_up:0,k_dn:0,p_up:0,p_dn:0,zero:0,log:[]}};
  chainPool=[...CHAIN];
  let pozPool;
  if(selPoz==='Test Mühendisi') pozPool=TM;
  else if(selPoz==='Yapay Zeka Mühendisi') pozPool=YZ;
  else if(selPoz==='Proje Yöneticisi') pozPool=PM;
  else pozPool=null;
  const kulturPool = selKulturVal==='startup' ? STARTUP : KURUMSAL;
  const qPoz    = pozPool ? karistir([...pozPool]).slice(0,6) : karistir([...GEN]).slice(0,10);
  const qGen    = pozPool ? karistir([...GEN]).slice(0,4) : [];
  const qKultur = karistir([...kulturPool]).slice(0,3);
  const qAile   = karistir([...AILE]).slice(0,2);
  const qAcil   = karistir([...ACIL]).slice(0,1);
  const base    = karistir([...qPoz,...qGen,...qKultur,...qAile,...qAcil]);
  // Her 4 senaryoda bir şans kartı ekle
  queue=[];
  base.forEach((sc,i)=>{
    queue.push(sc);
    if((i+1)%4===0 && i<base.length-1) queue.push({type:'wildcard'});
  });
  qi=0;
  goster('s-game');
  sahne();
}

}
function sr(l,v,c){
  return `<div class="s-row">
    <span class="s-lbl">${l}</span>
    <div class="s-track"><div class="s-fill ${c}" style="width:${v}%"></div></div>

}

/* ── SENARYO ── */
function sahne() {
  const sc=queue[qi];
  statsGuncelle();
  document.getElementById('p-body').scrollTop=0;
  document.getElementById('strip-wrap').innerHTML='';
  document.getElementById('sc-text').textContent='';

  if(sc.type==='wildcard'){
    document.getElementById('sc-title').textContent='🎲 Talih mi Bela mı?';
    document.getElementById('sc-text').textContent='Günün sürprizi geldi. Ne geleceğini kimse bilmiyor — sen de.';
    const w=document.getElementById('strip-wrap');
    const b=document.createElement('button');
    b.className='strip';
    b.style.cssText='background:linear-gradient(135deg,#c4b5fd,#818cf8);font-weight:700;font-size:1.2em;justify-content:center;color:#1e1b4b;';
    b.textContent='🎲 Kartı Çevir!';
    b.onclick=()=>wildcardCevir(w);
    w.appendChild(b);
    return;
  }

  if(sc.acil){
    document.getElementById('sc-title').innerHTML=`<span style="color:#dc2626">🚨 ACİL</span> — ${sc.t.replace(/^🚨 ACİL: /,'')}`;
  } else {
    document.getElementById('sc-title').textContent=sc.t;
  }
  yaz(document.getElementById('sc-text'),sc.m(ST),0,()=>secenekler(sc));
}
function wildcardCevir(w){
  playPaper();
  const o=WILDCARD_POOL[Math.floor(Math.random()*WILDCARD_POOL.length)];
  w.querySelectorAll('button').forEach(b=>b.disabled=true);
  pending=o;
  const parts=[];
  if(o.k) parts.push(`<span class="${o.k>0?'dp':'dn'}">${o.k>0?'+':''}${o.k} Kariyer</span>`);
  if(o.p) parts.push(`<span class="${o.p>0?'dp':'dn'}">${o.p>0?'+':''}${o.p} Patron</span>`);
  if(o.a) parts.push(`<span class="${o.a>0?'dp':'dn'}">${o.a>0?'+':''}${o.a} Arkadaşlar</span>`);
  if(o.i) parts.push(`<span class="${o.i>0?'dp':'dn'}">${o.i>0?'+':''}${o.i} Aile</span>`);
  if(!parts.length) parts.push('<span class="dz">Hiçbir stat değişmedi</span>');
  document.getElementById('fb-deltas').innerHTML=`<span style="font-size:1.1em">${o.m}</span><br>${parts.join('  ·  ')}`;
  document.getElementById('fb-text').textContent=o.ac;
  document.getElementById('overlay').classList.add('show');
}
function yaz(el,txt,i,cb){
  if(i<txt.length){
    el.textContent+=txt[i];
    if(i%4===0) playClick();
    setTimeout(()=>yaz(el,txt,i+1,cb),14);
  } else if(cb) setTimeout(cb,120);
}
function secenekler(sc){
  const w=document.getElementById('strip-wrap');
  w.innerHTML='';
  sc.o.forEach(o=>{
    const b=document.createElement('button');
    b.className='strip'; b.textContent=o.m;
    b.onclick=()=>{ timerDur(); sec(o,w); };
    w.appendChild(b);
  });
  if(sc.acil) timerBasla(sc,w);
}

/* ── SEÇİM ── */
function sec(o,w){
  playPaper();
  w.querySelectorAll('.strip').forEach(b=>b.disabled=true);
  pending=o;
  const parts=[];
  if(o.k) parts.push(`<span class="${o.k>0?'dp':'dn'}">${o.k>0?'+':''}${o.k} Kariyer</span>`);
  if(o.p) parts.push(`<span class="${o.p>0?'dp':'dn'}">${o.p>0?'+':''}${o.p} Patron</span>`);
  if(o.a) parts.push(`<span class="${o.a>0?'dp':'dn'}">${o.a>0?'+':''}${o.a} Arkadaşlar</span>`);
  if(o.i) parts.push(`<span class="${o.i>0?'dp':'dn'}">${o.i>0?'+':''}${o.i} Aile</span>`);
  if(!parts.length) parts.push('<span class="dz">Hiçbir stat değişmedi</span>');
  document.getElementById('fb-deltas').innerHTML=parts.join('  ·  ');
  document.getElementById('fb-text').textContent=o.ac;
  document.getElementById('overlay').classList.add('show');
}
function feedbackKapat(){
  timerDur();
  document.getElementById('overlay').classList.remove('show');
  const dk=pending.k||0, dp=pending.p||0;
  if(dk>0) ST.stats.k_up++; else if(dk<0) ST.stats.k_dn++;
  if(dp>0) ST.stats.p_up++; else if(dp<0) ST.stats.p_dn++;
  if(!pending.k&&!pending.p&&!pending.a&&!pending.i) ST.stats.zero++;
  if(pending.log) ST.stats.log.push(pending.log);
  ST.kariyer    =sik(ST.kariyer   +dk);
  ST.patron     =sik(ST.patron    +dp);
  ST.arkadaslar =sik(ST.arkadaslar+(pending.a||0));
  ST.aile       =sik(ST.aile     +(pending.i||0));
  if(pending.sets) ST.flags.add(pending.sets);
  pending=null; qi++;
  // Zincirleme senaryo enjeksiyonu
  chainPool=chainPool.filter(sc=>{
    if(ST.flags.has(sc.req)){
      queue.splice(qi,0,sc);
      return false;
    }
    return true;
  });
  if(qi>=queue.length) sonuc();
  else{
    document.getElementById('sc-text').textContent='';
    document.getElementById('strip-wrap').innerHTML='';
    sahne();
  }
}

/* ── SONUÇ ── */
function sonuc(){
  const{kariyer:k,patron:p,arkadaslar:a,aile:ai,n,poz,flags,stats,kultur}=ST;
  const ort=Math.round((k+p+a+ai)/4);

  // ── Ending belirleme (öncelik sıralı) ──
  let ending;
  if(k<25){
    ending={icon:'🚪',title:'İşten Çıkarıldın',
      desc:`Tarık Bey masana geldi. "${n}, seninle konuşmam lazım." HR toplantısı, formaliteler, güvenlik eşliğinde çıkış. Makro Yazılım seni unutmadı — ama sebepleri için.`,
      bg:'#fee2e2',border:'#ef4444'};
  } else if(k>80&&p>65){
    ending={icon:'🚀',title:'Terfi Ettin: Takım Lideri',
      desc:`Tarık Bey kapını çaldı. "Seni Takım Lideri yapmak istiyorum." Ekip alkışladı. Şeyda LinkedIn'den bağlantı isteği attı. Maaş 3x oldu — fatura da.`,
      bg:'#dcfce7',border:'#16a34a'};
  } else if(k>80){
    ending={icon:'✈️',title:'Yurt Dışı Teklifi',
      desc:`LinkedIn'den yabancı bir şirketten mesaj. Remote pozisyon, 3x maaş. Tarık Bey istifa zarfını açtı. "Geri dönersin" dedi. Belki haklı. Belki değil.`,
      bg:'#e0f2fe',border:'#0284c7'};
  } else if(k>60&&p<35){
    ending={icon:'💻',title:'Freelance\'e Geçtin',
      desc:`Tarık Bey ile son sprint review'dan sonra kararını verdin. Şirketten ayrıldın. İlk müşterin eski ofisinin rakibi. Pijamada çalışmak düşündüğün gibi değilmiş.`,
      bg:'#fef9c3',border:'#ca8a04'};
  } else if(p>75&&k<45){
    ending={icon:'🤝',title:'"Sadık Çalışan"',
      desc:`Tarık Bey seni seviyor. Çok seviyor. Ama terfi yok — çünkü "sen zaten burada mutlusun." LinkedIn profilin 3 yıldır güncellenmedi. Bunu sen de biliyorsun.`,
      bg:'#fce7f3',border:'#db2777'};
  } else if(ai<25||(a<25&&k<55)){
    ending={icon:'😵',title:'Burn-out',
      desc:`Bir sabah kalkmak istedin. Kalkamadın. Doktor "stres" dedi. Aile "biz seni uyardık" dedi. Makro Yazılım "geçmiş olsun" dedi. 2 haftalık izin başladı.`,
      bg:'#fef3c7',border:'#d97706'};
  } else if(k>=55&&p>=55&&a>=55&&ai>=55){
    ending={icon:'🌟',title:'Dengeli Hayat',
      desc:`İş iyiydi. Hayat iyiydi. Mükemmel değil — ama iyi. Cem ile öğle yemeği, aile ile hafta sonu, Tarık Bey ile saygılı mesafe. Bunu başarmak kolay değil.`,
      bg:'#f0fdf4',border:'#22c55e'};
  } else {
    ending=null;
  }

  // ── Rozetler ──
  const badges=[];
  if(k>=80)                    badges.push('🏆 Kariyer Efsanesi');
  if(p>=80)                    badges.push('🤝 Patron\'un Gözdesi');
  if(ai>=80)                   badges.push('❤️ Aile Dostu');
  if(a>=80)                    badges.push('🎉 Ofis Maskotu');
  if(k>=55&&p>=55&&a>=55&&ai>=55) badges.push('🧘 Denge Ustası');
  if(k<25)                     badges.push('🔥 Her Şeyi Yaktı');
  if(ai<20&&a<20)              badges.push('💀 Burn-out Şampiyonu');
  if(p>75&&k<45)               badges.push('🪞 Yansıma Uzmanı');
  if(flags.has('yazici_yumruk'))  badges.push('🖨️ Yazıcı Dövüşçüsü');
  if(flags.has('kahve_herkese'))  badges.push('☕ Kahve Kahraman');
  if(flags.has('cem_gofreti'))    badges.push('🐜 Gofret Katili');

  const badgeHTML=badges.length?`
    <div style="margin:10px 0 12px;padding:10px 14px;background:#f8fafc;border:1.5px dashed #94a3b8;border-radius:4px">
      <div style="font-size:0.95em;color:#64748b;margin-bottom:8px">🎖️ Kazandığın Unvanlar</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${badges.map(b=>`<span style="background:#e2e8f0;padding:3px 12px;border-radius:20px;font-size:0.95em">${b}</span>`).join('')}</div>
    </div>`:'';

  // ── Per-stat yorumları ──
  const pV=p>=80?'🤝 Tarık Bey seni "geleceğin lideri" olarak gösteriyor.'
          :p>=60?'👔 Tarık Bey senden memnun, ama bunu yüzüne söylemez.'
          :p>=40?'😶 Tarık Bey seni "var da yok da aynı" kategorisine koydu.'
          :p>=20?'😤 Tarık Bey seninle toplantı öncesi derin nefes alıyor.'
          :      '🔥 Tarık Bey her hafta IK\'ya "sorunlu çalışan" diye işliyor.';
  const aV=a>=80?'🎉 Cem ve Zeynep seni "öğle yemeği first pick" ilan etti.'
          :a>=60?'😊 Ekip seni seviyor. Doğum günündeki pastada adın var.'
          :a>=40?'🙂 Kimseden şikâyet yok ama özel WA grubuna alınmadın.'
          :a>=20?'😒 Mutfakta girerken konuşmalar kesiliyor.'
          :      '👻 "Kim bu?" sorusu hâlâ soruluyor. 6. ayındasın.';
  const aiV=ai>=80?'❤️ Ailen "en çok sen anlıyorsun bizi" diyor.'
           :ai>=60?'😊 Aile toplantılarında seni özlemişler ama anlıyorlar.'
           :ai>=40?'😔 Annen "iş iş iş" diye başlayan mesajlar atmaya başladı.'
           :ai>=20?'😢 Kardeşin "iş bu, iş geçmez" repliğini ezbere biliyor.'
           :       '💔 Aile WhatsApp grubundan çıkarıldın. Sessizce.';

  // ── Şeyda mesajı ──
  const seydaMsg=k>=70&&p>=70?`
    <div style="margin:10px 0;padding:12px 16px;background:#fef9c3;border-left:3px solid #c8a000;font-size:1.1em;font-style:italic">
      📩 CTO Şeyda'dan mesaj geldi:<br>"${n}, Makro Yazılım'a katkıların için teşekkürler. Yakında konuşalım 😊"
    </div>`:'';

  const endingHTML=ending?`
    <div style="margin:12px 0;padding:14px 16px;background:${ending.bg};border-left:4px solid ${ending.border};border-radius:3px">
      <div style="font-size:1.5em;font-weight:700;margin-bottom:6px">${ending.icon} ${ending.title}</div>
      <div style="font-size:1.1em;line-height:1.65;color:#333">${ending.desc}</div>
    </div>`:'';

  // ── Oyun sonu istatistikleri ──
  const ozet=[];
  if(stats.log.length) ozet.push(...stats.log.slice(0,6));
  if(stats.k_dn>=4) ozet.push(`📉 Kariyer ${stats.k_dn} kez düştü`);
  if(stats.k_up>=5) ozet.push(`📈 Kariyer ${stats.k_up} kez yükseldi`);
  if(stats.p_up>=4) ozet.push(`😏 Patronu ${stats.p_up} kez mutlu etti`);
  if(stats.p_dn>=4) ozet.push(`😤 Patronu ${stats.p_dn} kez sinirletti`);
  if(stats.zero>=3) ozet.push(`😐 ${stats.zero} karar hiçbir şeyi değiştirmedi`);
  ozet.push(`📊 ${queue.length} kararın tamamı verildi`);
  const ozetHTML=`
    <div style="margin:10px 0 12px;padding:10px 14px;background:#f8fafc;border:1.5px dashed #94a3b8;border-radius:4px">
      <div style="font-size:0.95em;color:#64748b;margin-bottom:8px">📋 Bu Oyunda...</div>
      <ul style="margin:0;padding-left:18px;font-size:1em;line-height:1.85;color:#334155">${ozet.map(x=>`<li>${x}</li>`).join('')}</ul>
    </div>`;

  document.getElementById('result-inner').innerHTML=`
    <div class="sec-title">🏁 Oyun Bitti</div>
    <p style="font-size:1.05em;color:#999;margin:4px 0 10px">${n} · ${poz} · ${kultur==='startup'?'🚀 Startup':'🏢 Kurumsal'} · Makro Yazılım A.Ş.</p>
    <div style="margin-bottom:10px;padding-bottom:10px;border-bottom:1.5px dashed #bbb">
      ${sr('💼 Kariyer',   k,  'fk')}
      ${sr('😤 Patron',    p,  'fp')}
      ${sr('🤝 Arkadaşlar',a,  'fa')}
      ${sr('🏠 Aile',      ai, 'fi')}
    </div>
    ${endingHTML}
    ${badgeHTML}
    ${ozetHTML}
    <div class="result-comment">${pV}</div>
    <div class="result-comment">${aV}</div>
    <div class="result-comment">${aiV}</div>
    ${seydaMsg}
    <button class="btn btn-g" onclick="location.reload()" style="margin-top:14px">🔄 Tekrar Oyna</button>
  `;
  goster('s-result');
}
</script>
