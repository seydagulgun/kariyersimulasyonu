<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💻 Yazılımcı Hayatı</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      overflow: hidden;
      font-family: 'Caveat', cursive;
      background-color: #5a3e28;
      background-image:
        repeating-linear-gradient(87deg, transparent, transparent 100px, rgba(0,0,0,0.04) 100px, rgba(0,0,0,0.04) 101px),
        repeating-linear-gradient(3deg,  transparent, transparent 60px,  rgba(255,255,255,0.03) 60px, rgba(255,255,255,0.03) 61px);
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    /* ═══ PAPER ═══════════════════════════════════════ */
    .paper {
      position: relative;
      width: 100%;
      max-width: 760px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fefcf3;
      background-image: repeating-linear-gradient(
        transparent, transparent 34px, #c8d4e3 34px, #c8d4e3 35px
      );
      box-shadow: 4px 0 0 #d9c9a3, 8px 0 20px rgba(0,0,0,0.3),
                  -2px 0 8px rgba(0,0,0,0.15);
    }

    /* kırmızı margin çizgisi */
    .paper::before {
      content: '';
      position: absolute;
      left: 64px; top: 0; bottom: 0; width: 2px;
      background: rgba(210,70,70,0.35);
      pointer-events: none; z-index: 1;
    }

    /* spiral delikler */
    .paper::after {
      content: '';
      position: absolute;
      left: 18px; top: 52px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #5a3e28;
      box-shadow: 0 100px 0 #5a3e28, 0 200px 0 #5a3e28,
                  0 300px 0 #5a3e28, 0 400px 0 #5a3e28,
                  0 500px 0 #5a3e28;
      pointer-events: none; z-index: 1;
    }

    /* ═══ BÖLÜMLER ═════════════════════════════════════ */
    .p-head    { flex-shrink: 0; padding: 16px 24px 0 80px; }
    .p-stats   { flex-shrink: 0; padding: 8px 24px 10px 80px; border-bottom: 1.5px dashed #b8bcc8; }
    .p-body    { flex: 1; overflow-y: auto; padding: 10px 24px 6px 80px; scrollbar-width: thin; scrollbar-color: #c8d4e3 transparent; }
    .p-choices { flex-shrink: 0; padding: 6px 24px 14px 80px; }

    /* ═══ SCREENS ══════════════════════════════════════ */
    .screen { display: none; height: 100%; flex-direction: column; }
    .screen.active { display: flex; }

    /* ═══ INTRO ════════════════════════════════════════ */
    .intro-inner {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; text-align: center; gap: 12px;
      padding: 0 20px;
    }
    .intro-title { font-size: 3em; font-weight: 700; color: #1a1a1a; line-height: 1.1; }
    .intro-sub   { font-size: 1.55em; color: #888; }
    .intro-desc  { font-size: 1.3em; color: #444; line-height: 1.7; }

    /* ═══ CHAR ═════════════════════════════════════════ */
    .char-inner {
      display: flex; flex-direction: column;
      height: 100%; padding: 0; justify-content: center; gap: 10px;
    }
    .sec-title {
      font-size: 1.9em; font-weight: 700; color: #1a1a1a;
      border-bottom: 2px solid #1a1a1a; padding-bottom: 3px; margin-bottom: 4px;
    }
    .char-label { font-size: 1.25em; color: #555; }
    .char-input {
      font-family: 'Caveat', cursive; font-size: 1.45em;
      border: none; border-bottom: 2px solid #555; background: transparent;
      outline: none; width: 200px; color: #1a1a1a; padding: 2px 0;
    }
    .pos-list { display: flex; flex-direction: column; gap: 6px; margin: 4px 0; }
    .pos-btn {
      font-family: 'Caveat', cursive; font-size: 1.25em;
      background: transparent; border: 1.5px solid #ccc; padding: 7px 14px;
      text-align: left; cursor: pointer; color: #333; transition: all 0.13s;
    }
    .pos-btn:hover, .pos-btn.sel {
      background: #fef9c3; border-color: #c8a000;
      transform: translateX(8px); font-weight: 700;
    }

    /* ═══ BUTONLAR ════════════════════════════════════ */
    .btn {
      display: inline-block; font-family: 'Caveat', cursive;
      font-size: 1.4em; font-weight: 700; padding: 10px 32px;
      cursor: pointer; border: 2px solid;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.13);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 4px 5px 0 rgba(0,0,0,0.18); }
    .btn:active { transform: translateY(0);    box-shadow: 1px 1px 0 rgba(0,0,0,0.1); }
    .btn-y { background: #fef08a; border-color: #c8a000; color: #1a1a1a; }
    .btn-g { background: #86efac; border-color: #16a34a; color: #1a1a1a; }
    .btn-off { opacity: 0.4; pointer-events: none; }

    /* ═══ STATS ════════════════════════════════════════ */
    .day-info { font-size: 1.1em; color: #999; margin-bottom: 6px; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 20px;
    }
    .s-row { display: flex; align-items: center; gap: 7px; }
    .s-lbl { width: 108px; font-size: 1.05em; color: #555; flex-shrink: 0; }
    .s-track {
      flex: 1; height: 10px; background: #e6e0d0;
      border: 1px solid #ccc; overflow: hidden;
    }
    .s-fill {
      height: 100%; transition: width 0.5s cubic-bezier(.4,0,.2,1);
      background-image: repeating-linear-gradient(
        45deg, rgba(255,255,255,0.18), rgba(255,255,255,0.18) 2px,
        transparent 2px, transparent 6px
      );
    }
    .fk { background-color: #4a6cf7; }
    .fp { background-color: #e85d4a; }
    .fa { background-color: #27ae60; }
    .fi { background-color: #f97316; }
    .s-num { width: 44px; text-align: right; font-size: 0.95em; color: #888; }

    /* ═══ SENARYO ══════════════════════════════════════ */
    .sc-title {
      font-size: 1.75em; font-weight: 700; color: #111;
      margin-bottom: 8px; line-height: 1.2; flex-shrink: 0;
    }
    .sc-text {
      font-size: 1.3em; color: #2d2d2d; line-height: 1.65;
      white-space: pre-wrap;
    }

    /* ═══ STRİP SEÇENEKLERİ ════════════════════════════ */
    .strip-wrap { display: flex; flex-direction: column; gap: 5px; }

    .strip {
      display: flex; align-items: center;
      width: 100%; min-height: 44px;
      padding: 7px 14px 7px 22px;
      border: none; cursor: pointer;
      text-align: left; position: relative;
      font-family: 'Caveat', cursive; font-size: 1.2em;
      color: #1a1a1a; line-height: 1.3;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    /* sol yapışma şeridi */
    .strip::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 10px;
      background: rgba(0,0,0,0.1);
      border-right: 1px solid rgba(0,0,0,0.07);
    }
    /* sağ alt kıvrım */
    .strip::after {
      content: '';
      position: absolute; right: 0; bottom: 0;
      width: 0; height: 0; border-style: solid;
      border-width: 0 0 14px 14px;
      border-color: transparent transparent rgba(0,0,0,0.08) transparent;
    }
    .strip:nth-child(1) { background: #fef08a; }
    .strip:nth-child(2) { background: #fda4af; }
    .strip:nth-child(3) { background: #93c5fd; }
    .strip:nth-child(4) { background: #86efac; }
    .strip:hover {
      transform: translateX(6px);
      box-shadow: 4px 3px 10px rgba(0,0,0,0.18);
    }
    .strip:disabled { opacity: 0.38; pointer-events: none; }

    /* ═══ FEEDBACK OVERLAY ════════════════════════════ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.22s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .fb-card {
      background: #fefcf3;
      background-image: repeating-linear-gradient(
        transparent, transparent 34px, #c8d4e3 34px, #c8d4e3 35px
      );
      max-width: 460px; width: 92%;
      padding: 32px 36px 28px;
      box-shadow: 5px 5px 0 #d9c9a3, 8px 8px 22px rgba(0,0,0,0.35);
      position: relative;
    }
    .fb-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 2px;
      background: rgba(210,70,70,0.3);
    }
    .fb-deltas { font-size: 1.55em; font-weight: 700; margin-bottom: 12px; line-height: 1.6; }
    .fb-text   { font-size: 1.28em; color: #444; margin-bottom: 22px; font-style: italic; line-height: 1.5; }
    .dp { color: #16a34a; }
    .dn { color: #dc2626; }
    .dz { color: #888; }

    /* ═══ SONUÇ ════════════════════════════════════════ */
    .result-inner {
      display: flex; flex-direction: column;
      height: 100%; overflow-y: auto; padding: 0;
      scrollbar-width: thin; scrollbar-color: #c8d4e3 transparent;
    }
    .result-verd    { font-size: 1.5em; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .result-comment { font-size: 1.2em; color: #555; margin-bottom: 8px; font-style: italic; }
    .result-overall {
      margin: 14px 0; padding: 14px 16px;
      background: #fef9c3; border-left: 4px solid #c8a000;
      font-size: 1.35em; font-weight: 700; color: #1a1a1a;
    }
  </style>
</head>
<body>
<div class="paper">

  <!-- ══ INTRO ════════════════════════════════════ -->
  <div class="screen active" id="s-intro">
    <div class="p-head" style="height:0"></div>
    <div class="p-body" style="display:flex;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div style="font-size:3em;font-weight:700;color:#1a1a1a;margin-bottom:6px">💻 Yazılımcı Hayatı</div>
        <div style="font-size:1.55em;color:#888;margin-bottom:28px">Bir Kariyer Simülasyonu</div>
        <div style="font-size:1.3em;color:#444;line-height:1.75;margin-bottom:36px">
          Her karar kariyerini, patronunu,<br>
          arkadaşlarını ve aileni etkiliyor.<br>
          Bazıları düşündüğün gibi değil.
        </div>
        <button class="btn btn-y" onclick="goster('s-char');charEkrani()">🚀 Başla</button>
      </div>
    </div>
  </div>

  <!-- ══ CHAR ══════════════════════════════════════ -->
  <div class="screen" id="s-char">
    <div class="p-head"><div style="height:16px"></div></div>
    <div class="p-body">
      <div class="char-inner">
        <div class="sec-title">Karakter Oluştur</div>
        <label class="char-label">Adın nedir?</label>
        <input class="char-input" id="char-ad" type="text" placeholder="Ali" maxlength="20">
        <label class="char-label" style="margin-top:8px">Pozisyonunu seç:</label>
        <div class="pos-list" id="pos-list"></div>
        <button class="btn btn-y btn-off" id="btn-basla" onclick="oyunBasla()" style="margin-top:8px;align-self:flex-start">İşe Başla →</button>
      </div>
    </div>
  </div>

  <!-- ══ GAME ═══════════════════════════════════════ -->
  <div class="screen" id="s-game">
    <div class="p-head">
      <div class="day-info" id="day-info"></div>
    </div>
    <div class="p-stats">
      <div class="stats-grid" id="stats-grid"></div>
    </div>
    <div class="p-body" id="p-body">
      <div class="sc-title" id="sc-title"></div>
      <div class="sc-text"  id="sc-text"></div>
    </div>
    <div class="p-choices">
      <div class="strip-wrap" id="strip-wrap"></div>
    </div>
  </div>

  <!-- ══ RESULT ═════════════════════════════════════ -->
  <div class="screen" id="s-result">
    <div class="p-head"><div style="height:16px"></div></div>
    <div class="p-body">
      <div class="result-inner" id="result-inner"></div>
    </div>
  </div>

</div><!-- /paper -->

<!-- ── Feedback overlay ──────────────────────── -->
<div class="overlay" id="overlay">
  <div class="fb-card">
    <div class="fb-deltas" id="fb-deltas"></div>
    <div class="fb-text"   id="fb-text"></div>
    <button class="btn btn-y" onclick="feedbackKapat()">Devam →</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   VERİ: senaryolar
   k=kariyer  p=patron  a=arkadaslar  i=aile
═══════════════════════════════════════════════ */

const POZLAR = ['Junior Developer','Mid-level Developer','Senior Developer','DevOps Mühendisi','Test Mühendisi'];

const GEN = [
  {
    t:'📋 Sprint Planning Toplantısı',
    m:s=>`Pazartesi 09:00. Henüz kahveni bile içmemişken PM Tarık Bey "Sprint planning var, 5 dakikaya gel" demişti.\n\nEkran dolup taşıyor: 47 backlog item.\n\nTarık Bey: "Bu sprint ${s.n}, hepsini bitiririz değil mi?" Ekip sana bakıyor. Kaktüs bile sana bakıyor.`,
    o:[
      {m:'"Tabii ki!" de ve mucize bekle.',      k:-15,p:+5, a:-5, i:0,  ac:'Sprint ortasında çöktün. Tarık Bey "neden söylemedi?" dedi.'},
      {m:'Story point hesapla, gerçekçi tahmin sun.',  k:+20,p:+10,a:+5, i:0,  ac:'Veri odaklı yaklaşımın takdir gördü. Ekip "sonunda biri söyledi" dedi.'},
      {m:'"Önce önceliklendirme yapalım" de.',   k:+10,p:0, a:+5, i:0,  ac:'Sağduyulu buldular ama Tarık Bey biraz sıkıldı.'},
      {m:'Telefona bak, "acil bir şey" de ve kaç.',k:-5,p:-15,a:-5,i:0, ac:'Kaçtın ama Slack\'te 47 kez mention\'landın.'}
    ]
  },
  {
    t:'💬 Yanlış Slack Mesajı',
    m:s=>`Öğle arası. Arkadaşına şikâyet mesajı yazacaksın:\n\n"Tarık Bey bugün de saçmaladı 🤦"\n\n...ve Enter\'a bastın. Gönderildi.\n\nKanal: #genel 👁️ (127 üye). Tarık Bey mesajı okudu.`,
    o:[
      {m:'Mesajı sil, hiçbir şey olmamış gibi davran.',k:-10,p:-20,a:0,i:0, ac:'Herkes gördü. Slack bildirim geçmişi silinemez.'},
      {m:'"Yanlış kanala, özür dilerim!" yaz.',       k:-5,p:-10,a:+5,i:0, ac:'Dürüst davrandın ama utanç devam ediyor.'},
      {m:'Tarık Bey\'e özür DM\'i at, yüz yüze konuş.', k:+15,p:+10,a:0,i:0, ac:'Olgun yaklaşım. Tarık Bey takdir etti.'},
      {m:'Sahiplen: "Evet, bu benim gerçek düşüncem."', k:+5,p:-5,a:+15,i:0, ac:'Arkadaşlar "bizim sesi" dedi. Tarık Bey ikili görüşme istedi.'}
    ]
  },
  {
    t:'🚨 Cuma 17:58 — Prod\'da Hata',
    m:s=>`Çantanı alıyorsun, kapıya yürüyorsun...\n\nTelefon titriyor: "CRITICAL: Ödeme servisi çöktü."\n\nSon deploy senindi. 17:45\'te merge etmiştin. Ekip hâlâ ofiste.`,
    o:[
      {m:'Geri dön, analiz et, düzelt.',         k:+25,p:+20,a:+10,i:0, ac:'45 dakikada fix\'ledin. Tarık Bey "işte bu" dedi. Efsane oldun.'},
      {m:'Deploy\'u revert et, sonra incele.',   k:+20,p:+15,a:+5, i:0, ac:'Hızlı düşündün. Servis kurtarıldı, herkes eve gitti.'},
      {m:'Telefonu cebine koy, "görmedim" de.', k:-30,p:-30,a:-20,i:0, ac:'Pazartesi toplantısı çok gergin geçti. Çok.'},
      {m:'On-call arkadaşını ara, devret.',      k:-5,p:-5, a:-10,i:0, ac:'"Senin deploy\'unda" baskısı hissedildi.'}
    ]
  },
  {
    t:'🔍 Code Review',
    m:s=>`PR\'ını açtın. Üç günlük emek.\n\nMert incelemeye başlıyor:\n💬 "Bu değişken ismi ne anlama geliyor?"\n💬 "Magic number kullanmışsın, constant yap."\n💬 "Neden bu kadar nested if var?"\n\nSon yorum: "Genel mantık iyi ama ciddi refactor lazım."`,
    o:[
      {m:'Tüm yorumları dikkate al, güncelle.',   k:+20,p:+5,a:+10,i:0, ac:'Büyüdün. Mert approve etti.'},
      {m:'"LGTM dersen merge ederim" de.',       k:-20,p:-5,a:-15,i:0, ac:'Mert çıldırdı. Teknik borç birikti.'},
      {m:'Kolayları yap, gerisini TODO bırak.',  k:-5,p:0, a:-5, i:0, ac:'TODO\'lar asla çözülmedi. 6 ay sonra hâlâ orada.'},
      {m:'Mert\'le sync kur, kritikleri tartış.', k:+15,p:+5,a:+15,i:0, ac:'Pragmatik yaklaşım. Mert artık sana lunch\'ta yer ayırıyor.'}
    ]
  },
  {
    t:'📅 Bu Toplantı E-posta Olabilirdi',
    m:s=>`Takviminde 2 saatlik toplantı: "Dashboard renk paleti kararı". 14 kişi davetli.\n\nDeadline yarın.\n\n38. dakika: "Bu turkuaz değil, zümrüt yeşili!" tartışması sürüyor.`,
    o:[
      {m:'Sabırla otur, katılımcı görün.',             k:-5,p:+5,a:0,  i:0, ac:'2 saat gitti. Feature gecikmesi başladı.'},
      {m:'"Bu kararı 3 kişi alabilir, çıkayım mı?"',  k:+10,p:-5,a:+5,i:0, ac:'Haklıydın. Çıktın, feature\'ı bitirdin.'},
      {m:'Toplantıda gizlice feature kodla.',          k:+5,p:-10,a:+10,i:0,ac:'Riskli ama pull off ettin.'},
      {m:'Herkese asenkron kültür mini-eğitimi ver.',  k:+15,p:+5,a:+15,i:0,ac:'Toplantı kültürü değişmeye başladı.'}
    ]
  },
  {
    t:'🎓 Yeni Eleman: Zeynep',
    m:s=>`Zeynep bugün işe başladı. Tarık Bey: "Zeynep\'i sen karşıla."\n\nDeadline yarın, 0 zamanın var.\n\nZeynep: "Repo\'yu clone\'ladım ama çalıştıramadım."\nREADME son güncellenme tarihi: 3 yıl önce.`,
    o:[
      {m:'Her şeyi bırak, Zeynep\'e saat harca.',   k:-5,p:+5,a:+20,i:0, ac:'Zeynep mutlu, ekip seni sevdi. Ama deadline patladı.'},
      {m:'README güncelle, kurulum script yaz.',     k:+25,p:+15,a:+20,i:0,ac:'Ekip README\'den kurtuldu. Tarık Bey "inisiyatif" dedi.'},
      {m:'"Trial & error yap" de.',                  k:-15,p:-5,a:-20,i:0, ac:'Zeynep ilk haftasını zor geçirdi. Senden soğudu.'},
      {m:'Başka arkadaşa yönlendir.',                k:0, p:0,a:-5, i:0, ac:'Zeynep yardım aldı ama sen fırsatı kaçırdın.'}
    ]
  },
  {
    t:'💰 Zam Görüşmesi',
    m:s=>`Yıl sonu. Tarık Bey: "Bu yıl iyiydi. Sana %8 zam düşündük."\n\nEnflasyon: %65.\nSeninle aynı pozisyonda biri dışarıda 2x maaş alıyor.\n\nTarık Bey gülümsüyor. Sen...`,
    o:[
      {m:'"Teşekkürler!" de, içten ağla.',              k:-10,p:+5,a:0, i:0, ac:'Tarık Bey memnun. Sen değil. Altı ay sonra mülakat verdin.'},
      {m:'Piyasa araştırmasını göster, müzakere et.',   k:+20,p:-5,a:0, i:0, ac:'Gergin sessizlik. Sonunda %18 anlaştınız.'},
      {m:'"Düşüneceğim" de, offer letter ile geri dön.',k:+25,p:-15,a:+5,i:0,ac:'Rakip %40 teklif etti. Tarık Bey counter yaptı.'},
      {m:'Reddet, kapıyı çarp çık.',                    k:-5,p:-25,a:+10,i:0,ac:'Dramatik ama etkili. Tarık Bey özür diledi. Şans eseri.'}
    ]
  },
  {
    t:'☕ Çay Ocağı Dedikodası',
    m:s=>`Mert ve Zeynep çay ocağında konuşuyor. Yaklaşınca duyuyorsun: Tarık Bey\'in favorisi Kemal hakkında.\n\nMert: "Kemal\'in o PR\'ı ben yazdım, adını bile koymadı."\n\nSeni görünce susuyor.`,
    o:[
      {m:'Kulak tıka, çayını al, dön.',              k:0,p:0,a:-5, i:0, ac:'"Soğuk" olarak etiketlendim dedi Zeynep.'},
      {m:'Dinle, sempati göster ama fikir verme.',   k:0,p:0,a:+10,i:0, ac:'Mert sana güvenmeye başladı.'},
      {m:'"Tarık Bey\'e söyleyelim mi?" de.',        k:-5,p:+5,a:-20,i:0,ac:'Mert sana bir daha sır vermeyeceğine yemin etti.'},
      {m:'"PR history var, belgele" de.',             k:+5,p:0,a:+15,i:0, ac:'Mert commit geçmişini buldu. Mutlu son.'}

/* ═══════════════════════════════════════════════
   DURUM
═══════════════════════════════════════════════ */
let ST = {}, queue = [], qi = 0, pending = null, selPoz = null;

/* ═══════════════════════════════════════════════
   YARDIMCILAR
═══════════════════════════════════════════════ */
function goster(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function karistir(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

function sıkıstir(v) { return Math.max(0, Math.min(100, v)); }

/* ═══════════════════════════════════════════════
   KARAKTER
═══════════════════════════════════════════════ */
function charEkrani() {
  const list = document.getElementById('pos-list');
  list.innerHTML = '';
  POZLAR.forEach(p => {
    const b = document.createElement('button');
    b.className = 'pos-btn';
    b.textContent = p;
    b.onclick = () => {
      selPoz = p;
      document.querySelectorAll('.pos-btn').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      document.getElementById('btn-basla').classList.remove('btn-off');
    };
    list.appendChild(b);
  });
}

function oyunBasla() {
  if (!selPoz) return;
  const ad = document.getElementById('char-ad').value.trim() || 'Ali';
  ST = { n: ad, poz: selPoz, kariyer: 50, patron: 50, arkadaslar: 50, aile: 50 };
  const pool = selPoz === 'Test Mühendisi' ? TM : GEN;
  queue = karistir([...pool]).slice(0, 7);
  qi = 0;
  goster('s-game');
  sahneGoster();
}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
function statsGuncelle() {
  document.getElementById('day-info').textContent =
    `Gün ${qi+1} / ${queue.length}  ·  ${ST.n}  ·  ${ST.poz}`;

  document.getElementById('stats-grid').innerHTML =
    satir('💼 Kariyer',    ST.kariyer,    'fk') +
    satir('😤 Patron',     ST.patron,     'fp') +
    satir('🤝 Arkadaşlar', ST.arkadaslar, 'fa') +
    satir('🏠 Aile',       ST.aile,       'fi');
}

function satir(lbl, val, cls) {
  return `<div class="s-row">
    <span class="s-lbl">${lbl}</span>
    <div class="s-track"><div class="s-fill ${cls}" style="width:${val}%"></div></div>
    <span class="s-num">${val}/100</span>
  </div>`;
}

/* ═══════════════════════════════════════════════
   SENARYO
═══════════════════════════════════════════════ */
function sahneGoster() {
  const sc = queue[qi];
  statsGuncelle();
  document.getElementById('sc-title').textContent = sc.t;
  document.getElementById('strip-wrap').innerHTML = '';
  const textEl = document.getElementById('sc-text');
  textEl.textContent = '';
  // body scroll sıfırla
  document.getElementById('p-body').scrollTop = 0;
  yaz(textEl, sc.m(ST), 0, () => secenekler(sc));
}

function yaz(el, txt, i, cb) {
  if (i < txt.length) {
    el.textContent += txt[i];
    setTimeout(() => yaz(el, txt, i+1, cb), 14);
  } else if (cb) {
    setTimeout(cb, 120);
  }
}

function secenekler(sc) {
  const wrap = document.getElementById('strip-wrap');
  wrap.innerHTML = '';
  sc.o.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'strip';
    btn.textContent = opt.m;
    btn.onclick = () => sec(opt, wrap);
    wrap.appendChild(btn);
  });
}

/* ═══════════════════════════════════════════════
   SEÇİM & FEEDBACK
═══════════════════════════════════════════════ */
function sec(opt, wrap) {
  wrap.querySelectorAll('.strip').forEach(b => b.disabled = true);
  pending = opt;
  const parts = [];
  if (opt.k) parts.push(`<span class="${opt.k>0?'dp':'dn'}">${opt.k>0?'+':''}${opt.k} Kariyer</span>`);
  if (opt.p) parts.push(`<span class="${opt.p>0?'dp':'dn'}">${opt.p>0?'+':''}${opt.p} Patron</span>`);
  if (opt.a) parts.push(`<span class="${opt.a>0?'dp':'dn'}">${opt.a>0?'+':''}${opt.a} Arkadaşlar</span>`);
  if (opt.i) parts.push(`<span class="${opt.i>0?'dp':'dn'}">${opt.i>0?'+':''}${opt.i} Aile</span>`);
  if (!parts.length) parts.push('<span class="dz">Hiçbir stat değişmedi</span>');

  document.getElementById('fb-deltas').innerHTML = parts.join('  ·  ');
  document.getElementById('fb-text').textContent = opt.ac;
  document.getElementById('overlay').classList.add('show');
}

function feedbackKapat() {
  document.getElementById('overlay').classList.remove('show');
  ST.kariyer    = sıkıstir(ST.kariyer    + (pending.k||0));
  ST.patron     = sıkıstir(ST.patron     + (pending.p||0));
  ST.arkadaslar = sıkıstir(ST.arkadaslar + (pending.a||0));
  ST.aile       = sıkıstir(ST.aile       + (pending.i||0));
  pending = null;
  qi++;
  if (qi >= queue.length) sonuc();
  else {
    document.getElementById('sc-text').textContent = '';
    document.getElementById('strip-wrap').innerHTML = '';
    sahneGoster();
  }
}

/* ═══════════════════════════════════════════════
   SONUÇ
═══════════════════════════════════════════════ */
function sonuc() {
  const {kariyer:k, patron:p, arkadaslar:a, aile:ai, n, poz} = ST;
  const ort = Math.round((k+p+a+ai)/4);

  const kV = k>=80?['⭐','Şirketin Efsanesi','LinkedIn profilin recruiter istilasında.']
           : k>=60?['👍','Güvenilir Yazılımcı','Zam görüşmesi yakında. Belki.']
           : k>=40?['😐','Fark Edilmeyen Çalışan','Tarık Bey bazen adını karıştırıyor.']
           : k>=20?['😬','Kriz Uzmanı','HR "gelişim planı" için davet etti.']
           :       ['💀','Efsanevi Kaos',`"${n.toLowerCase()}lamak" şirkette bir fiil oldu.`];

  const pV = p>=80?'🤝 Tarık Bey seni "geleceğin lideri" olarak gösteriyor.'
           : p>=60?'👔 Tarık Bey senden memnun, ama bunu yüzüne söylemez.'
           : p>=40?'😶 Tarık Bey seni "var da yok da aynı" kategorisine koydu.'
           : p>=20?'😤 Tarık Bey seninle toplantı öncesi derin nefes alıyor.'
           :       '🔥 Tarık Bey seni her hafta IK\'ya "sorunlu çalışan" diye işliyor.';

  const aV = a>=80?'🎉 Mert ve Zeynep seni "öğle yemeği first pick" ilan etti.'
           : a>=60?'😊 Ekip seni seviyor. Doğum günündeki pastada adın var.'
           : a>=40?'🙂 Kimseden şikâyet yok ama özel WA grubuna alınmadın.'
           : a>=20?'😒 Mutfakta girerken konuşmalar kesiliyor.'
           :       '👻 "Kim bu?" sorusu hâlâ soruluyor. 6. ayındasın.';

  const aiV = ai>=80?'❤️ Ailen "en çok sen anlıyorsun bizi" diyor.'
            : ai>=60?'😊 Aile toplantılarında seni özlemişler ama anlıyorlar.'
            : ai>=40?'😔 Annen "iş iş iş" diye başlayan mesajlar atmaya başladı.'
            : ai>=20?'😢 Kardeşin senin yerine "iş bu, iş geçmez" repliğini biliyor.'
            :        '💔 Aile WhatsApp grubundan çıkarıldın. Sessizce.';

  const genV = ort>=75?'✨ Mükemmel Denge — Hayali Çalışan'
             : ort>=55?'👏 İyi Skor — Sağlam Çalışan'
             : ort>=35?'📈 Orta Skor — Gelişim Gerekli'
             :         '😅 Düşük Skor — Belki Yeni Bir Başlangıç?';

  document.getElementById('result-inner').innerHTML = `
    <div class="sec-title">🏁 Oyun Bitti</div>
    <p style="font-size:1.15em;color:#999;margin:4px 0 14px">${n} · ${poz}</p>
    <div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1.5px dashed #bbb">
      ${satir('💼 Kariyer',    k,  'fk')}
      ${satir('😤 Patron',     p,  'fp')}
      ${satir('🤝 Arkadaşlar', a,  'fa')}
      ${satir('🏠 Aile',       ai, 'fi')}
    </div>
    <div class="result-verd">${kV[0]} ${kV[1]}</div>
    <div class="result-comment">${kV[2]}</div>
    <div class="result-comment">${pV}</div>
    <div class="result-comment">${aV}</div>
    <div class="result-comment">${aiV}</div>
    <div class="result-overall">Genel Ortalama: ${ort}/100<br>${genV}</div>
    <button class="btn btn-g" onclick="location.reload()">🔄 Tekrar Oyna</button>
  `;
  goster('s-result');
}
</script>
